# Dracula Theme for Starship
# https://draculatheme.com/starship

palette = "dracula"

add_newline = true

format = """
$directory$php$nodejs$python$rust$golang$java$git_branch$git_status$character"""

[aws]
style = "bold orange"

[character]
format = "$symbol "
error_symbol = "[λ](bold red)"
success_symbol = "[λ](bold green)"

[cmd_duration]
style = "bold yellow"

[directory]
style = "bold green"
truncation_length = 3
home_symbol = "~"

[git_branch]
format = " [$symbol$branch]($style)"
symbol = " "
style = "bold pink"

[git_status]
style = "bold red"
format = "([$all_status]($style))"

[hostname]
style = "bold purple"
format = "[$hostname]($style) "

[username]
format = "[$user]($style) on "
style_user = "bold cyan"

[python]
symbol = "🐍 "
format = "via [$symbol$version]($style) "
style = "bold yellow"
version_format = "${raw}"
detect_files = ["requirements.txt", "pyproject.toml", "Pipfile", ".python-version"]

[nodejs]
symbol = "⬢ "
format = "via [$symbol$version]($style) "
style = "bold green"
version_format = "${raw}"
detect_files = ["package.json", "package-lock.json", "yarn.lock"]
detect_folders = ["node_modules"]

[rust]
symbol = "🦀 "
format = "via [$symbol$version]($style) "
style = "bold red"
version_format = "${raw}"
detect_files = ["Cargo.toml", "Cargo.lock"]

[golang]
symbol = "🐹 "
format = "via [$symbol$version]($style) "
style = "bold cyan"
version_format = "${raw}"
detect_files = ["go.mod", "go.sum"]

[java]
symbol = "☕ "
format = "via [$symbol$version]($style) "
style = "bold red"
version_format = "${raw}"
detect_files = ["pom.xml", "build.gradle", "build.gradle.kts"]

[php]
symbol = "🐘 "
format = "via [$symbol$version]($style) "
style = "bold purple"
version_format = "${raw}"
detect_files = ["composer.json"]

# Define Dracula color palette
[palettes.dracula]
background = "#282a36"
current_line = "#44475a"
foreground = "#f8f8f2"
comment = "#6272a4"
cyan = "#8be9fd"
green = "#50fa7b"
orange = "#ffb86c"
pink = "#ff79c6"
purple = "#bd93f9"
red = "#ff5555"
yellow = "#f1fa8c"
