[module/workspaces]
type = internal/xworkspaces

pin-workspaces = true
enable-click = true
enable-scroll = true
font-0 = "Hack Nerd Font Mono:size=13;2"
font-1 = "Hack Nerd Font:size=14;2"
font-2 = "FontAwesome:size=16;4"
icon-0 = I;’×¤
icon-1 = II;’×¤
icon-2 = III;’×¤
icon-3 = IV;’×¤
icon-4 = V;’×¤
icon-5 = VI;’×¤
icon-6 = VII;’×¤
icon-7 = VIII;’×¤
icon-8 = IX;’×¤
icon-9 = X;’×¤
icon-default =
format = <label-state>
format-padding = 0

label-active = " %icon% "
label-active-font = 2
label-active-foreground = ${colors.yellow}
label-active-background = ${colors.bg}

label-occupied = " %icon% "
label-occupied-font = 2
label-occupied-foreground = ${colors.light-purple}
label-occupied-background = ${colors.bg}

label-urgent = " %icon% "
label-urgent-font = 2
label-urgent-foreground = ${colors.ac}
label-urgent-background = ${colors.bg}

label-empty = " %icon% "
label-empty-font = 2
label-empty-foreground = ${colors.ghost}
label-empty-background = ${colors.bg}
