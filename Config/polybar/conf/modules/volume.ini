[module/volume]
type = internal/alsa
master-mixer = ${env:POLYBAR_MIXER:Master}
format-volume = <ramp-volume> <label-volume>
format-muted = <label-muted>
format-foreground = ${colors.cyan}
format-background = ${colors.bg}
click-right = sh -c 'amixer set "${POLYBAR_MIXER:-Master}" toggle >/dev/null 2>&1 || amixer set Master toggle >/dev/null 2>&1'
scroll-up = sh -c 'amixer set "${POLYBAR_MIXER:-Master}" 5%+ unmute >/dev/null 2>&1 || amixer set Master 5%+ unmute >/dev/null 2>&1'
scroll-down = sh -c 'amixer set "${POLYBAR_MIXER:-Master}" 5%- unmute >/dev/null 2>&1 || amixer set Master 5%- unmute >/dev/null 2>&1'

ramp-volume-0 = " "
ramp-volume-1 = " "
ramp-volume-2 = " "
ramp-volume-3 = " "
ramp-volume-font = 2
ramp-volume-foreground = ${colors.cyan}
label-volume = %percentage%%
label-muted = " mute"
label-muted-font = 2
label-muted-foreground = ${colors.muted}
