[colors]
bg = #2F343F
fg = #FFFFFF
ac = #FFD700
red = #FF4444
pink = #FF69B4
cyan = #00CED1
orange = #FF8C00
yellow = #FFD700
light-purple = #FF69B4
ghost = #7DCFFF
muted = #A0A7B4

[global/wm]
margin-top = 0
margin-bottom = 0

[settings]
screenchange-reload = true
compositing-background = source
compositing-foreground = over
compositing-overline = over
compositing-underline = over
compositing-border = over

[bar/main]
monitor = 
bottom = false
fixed-center = true
width = 100%
height = 34
offset-x = 0
offset-y = 0
background = ${colors.bg}
foreground = ${colors.fg}
line-size = 2
line-color = ${colors.ac}
border-bottom-size = 0
padding = 2
module-margin-left = 1
module-margin-right = 2
font-0 = "Hack Nerd Font Mono:size=14;2"
font-1 = "Hack Nerd Font:size=15;2"
font-2 = "FontAwesome:size=13;3"
separator = "Ōöé"
separator-foreground = ${colors.muted}
cursor-click = pointer
cursor-scroll = ns-resize

modules-left = workspaces
modules-center = xwindow
modules-right = wifi volume cpu ram battery date

tray-position = right
tray-padding = 2
tray-maxsize = 22
tray-background = ${colors.bg}

wm-restack = bspwm
enable-ipc = true

;; =============================================================================
;; MODULE: WORKSPACES
;; =====================================
[module/workspaces]
type = internal/xworkspaces

pin-workspaces = true
enable-click = true
enable-scroll = true
font-0 = "Hack Nerd Font Mono:size=13;2"
font-1 = "Hack Nerd Font:size=14;2"
font-2 = "FontAwesome:size=12;3"
icon-0 = 1;-
icon-1 = 2;’äī
icon-2 = 3;’äī
icon-3 = 4;’äī
icon-4 = 5;’äī
icon-default = ŌłÖ
format = <label-state>
format-padding = 0

label-active = " ’äī "
label-active-foreground = ${colors.yellow}
label-active-background = ${colors.bg}

label-occupied = " ’×¤  "
label-occupied-foreground = ${colors.light-purple}
label-occupied-background = ${colors.bg}

label-urgent = "%icon% "
label-urgent-foreground = ${colors.ac}
label-urgent-background = ${colors.bg}

label-empty = " ’×¤ "
label-empty-foreground = ${colors.ghost}
label-empty-background = ${colors.bg}

;; =============================================================================
;; MODULE: WINDOW TITLE
;; =====================================
[module/xwindow]
type = internal/xwindow
format = <label>
format-foreground = ${colors.fg}
format-background = ${colors.bg}
label = %title%
label-maxlen = 60
label-empty = Escritorio

;; =============================================================================
;; MODULE: CPU
;; =====================================

[module/cpu]
type = internal/cpu
interval = 3
format = <label>
format-prefix = " ’ŗø "
format-prefix-foreground = ${colors.cyan}
label = %percentage%%
;; =============================================================================
;; MODULE: RAM MEMORY
;; =====================================
[module/ram]
type = internal/memory
interval = 3
format = <label>
format-prefix = " ’öĖ "
format-prefix-foreground = ${colors.orange}
label = %percentage_used%%
;; =============================================================================
;; MODULE: VOLUME
;; =====================================

[module/volume]
type = internal/alsa
format-volume = <ramp-volume> <label-volume>
format-muted = <label-muted>
format-foreground = ${colors.cyan}
format-background = ${colors.bg}
click-right = amixer set Master toggle

ramp-volume-0 = "’Ć” "
ramp-volume-1 = "’Ć¦ "
ramp-volume-2 = "’Ć¦ "
ramp-volume-3 = "’Ć¦ "
ramp-volume-foreground = ${colors.cyan}
label-volume = %percentage%%
label-muted = "’Ć” mute"
label-muted-foreground = ${colors.muted}

;; =============================================================================
;; MODULE: WIFI
;; =====================================
[module/wifi]
type = custom/script
interval = 8
exec = $HOME/.config/polybar/scripts/wifi-status
click-left = $HOME/.config/polybar/scripts/wifi-applet
format = <label>
format-foreground = ${colors.fg}
format-background = ${colors.bg}
label = %output%

;; =============================================================================
;; MODULE: BATTERY
;; =====================================
[module/battery]

type = internal/battery
battery = BAT0
adapter = ADP1
interval = 5
full-at = 99
low-at = 15
format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <label-full>
format-low = <label-low>
format-foreground = ${colors.cyan}
format-background = ${colors.bg}

label-charging = %percentage%%
label-discharging = %percentage%%
label-full = "’ēĆ 100%"
label-low = "’ēä %percentage%%"
label-low-foreground = ${colors.red}

ramp-capacity-0 = "’ēä"
ramp-capacity-1 = "’ēā"
ramp-capacity-2 = "’ēé"
ramp-capacity-3 = "’ēé"
ramp-capacity-4 = "’ēĆ"
ramp-capacity-5 = "’ēĆ"
ramp-capacity-6 = "’ēĆ"
ramp-capacity-7 = "’ēĆ"
ramp-capacity-8 = "’ēĆ"
ramp-capacity-9 = "’ēĆ"
ramp-capacity-foreground = ${colors.red}

animation-charging-0 = "¾░ó£ "
animation-charging-1 = "¾░éå "
animation-charging-2 = "¾░éć "
animation-charging-3 = "¾░éł "
animation-charging-foreground = ${colors.ac}
animation-charging-framerate = 500
;; =============================================================================
;; MODULE: DATE AND TIME
;; =====================================
[module/date]
type = internal/date
interval = 5
time = %H:%M
time-alt = %H:%M:%S
date = %a %b %d
date-alt = %A %d %B %Y
format = <label>
format-foreground = ${colors.orange}
format-background = ${colors.bg}
label = %date% %time%
label-alt = %date-alt% %time-alt%
click-left = polybar-msg action "#date.toggle"
