##############################################################################
#                      VM-SAFE PICOM PROFILE (XRENDER)                       #
##############################################################################

# Virtualized GPUs often fail or stutter with GLX + blur, so keep this profile
# conservative and stable.

backend = "xrender";
vsync = false;
use-damage = false;

shadow = true;
shadow-radius = 10;
shadow-opacity = 0.85;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

fading = true;
fade-in-step = 0.06;
fade-out-step = 0.06;
no-fading-openclose = false;

inactive-opacity = 0.85;
inactive-opacity-override = false;
frame-opacity = 1.0;
active-opacity = 1.0;

blur-method = "none";
blur-background = false;

detect-transient = true;
detect-client-leader = true;
detect-rounded-corners = true;
detect-client-opacity = true;

mark-wmwin-focused = true;
mark-ovredir-focused = true;
refresh-rate = 0;
log-level = "warn";

wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.9; };
  dnd = { shadow = false; };
  dropdown_menu = { shadow = false; };
  popup_menu = { shadow = false; };
  utility = { shadow = false; };
}
